<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>AAF v2 Mana Layout Editor</title>
  <link rel="stylesheet" href="v2_frame_element_editor.css">
</head>
<body
  data-title="Mana Frame Elements"
  data-layout="../data/layouts/icon-elements.mana.json"
  data-frame-rules="../data/aaf-v1/rules/active_frame_3_manual.json">
  <main>
    <h1 id="title"></h1>
    <div id="stage"></div>
  </main>
  <aside>
    <label>Layer<select id="layerSelect"></select></label>
    <label>Element samples, comma-separated. Rendered left-to-right.<input id="elementSamples" type="text" value="Fire, Ice, Holy"></label>
    <div class="row">
      <label>X center<input id="xInput" type="number" step="0.25"></label>
      <label>Y center<input id="yInput" type="number" step="0.25"></label>
    </div>
    <div class="row">
      <label>Width<input id="widthInput" type="number" step="0.25"></label>
      <label>Height<input id="heightInput" type="number" step="0.25"></label>
    </div>
    <label><span><input id="proportionalInput" type="checkbox" checked style="width:auto"> Lock proportions</span></label>
    <div class="row">
      <label>Gap X<input id="gapXInput" type="number" step="0.25"></label>
      <label>Gap Y<input id="gapYInput" type="number" step="0.25"></label>
    </div>
    <label>Rotation<input id="rotationInput" type="number" step="1"></label>
    <label><span><input id="visibleInput" type="checkbox" style="width:auto"> Visible</span></label>
    <button id="undoBtn" type="button">Undo</button>
    <button id="exportBtn" type="button">Export JSON</button>
    <button id="importBtn" type="button">Import JSON</button>
    <textarea id="jsonBox" spellcheck="false"></textarea>
  </aside>
  <script src="v2_frame_element_editor.js"></script>
</body>
</html>
